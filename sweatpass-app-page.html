<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download SweatPass</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
            box-sizing: border-box;
        }
        .logo {
            width: 100px;
            height: 100px;
            border-radius: 25%;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            object-fit: cover;
        }
        h1 {
            font-size: 24px;
            color: #333;
            margin-top: 0;
            margin-bottom: 8px;
        }
        p {
            color: #666;
            margin-bottom: 30px;
            font-size: 15px;
        }
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 14px 24px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
        }
        .btn:active {
            transform: translateY(0);
        }
        .btn-apple {
            background-color: #000;
            color: #fff;
        }
        .btn-android {
            background-color: #000;
            color: #fff;
        }
        .spinner {
            margin-top: 25px;
            border: 3px solid rgba(0,0,0,0.05);
            border-left-color: #000;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            margin-left: auto;
            margin-right: auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .icon {
            width: 20px;
            height: 20px;
            margin-right: 10px;
            fill: currentColor;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Logo from the provided URL -->
        <img src="https://play-lh.googleusercontent.com/ytkEX8cvsY60JqpfRwubzJi5LL-aloyey4_D_KgSJN0WF8nS3-g3l32Sh3dyM84hthz8pyC6iZk2eMfspI5tRQ" alt="SweatPass Logo" class="logo">
        
        <h1>Get SweatPass</h1>
        <p id="status-text">Taking you to the app store...</p>
        
        <div class="spinner" id="spinner"></div>

        <div class="buttons" id="fallback-buttons" style="display: none; margin-top: 20px;">
            <a href="https://apps.apple.com/us/app/sweatpass-earn-screen-time/id6755523483" class="btn btn-apple">
                <svg class="icon" viewBox="0 0 384 512"><path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/></svg>
                Download on the App Store
            </a>
            <a href="https://play.google.com/store/apps/details?id=com.codenexx.sweatpass&hl=en" class="btn btn-android">
                <svg class="icon" viewBox="0 0 512 512"><path d="M325.3 234.3L104.6 13l280.8 161.2-60.1 60.1zM47 0C34 6.8 25.3 19.2 25.3 35.3v441.3c0 16.1 8.7 28.5 21.7 35.3l256.6-256L47 0zm425.2 225.6l-58.9-34.1-65.7 64.5 65.7 64.5 60.1-34.1c18-14.3 18-46.5-1.2-60.8zM104.6 499l280.8-161.2-60.1-60.1L104.6 499z"/></svg>
                Get it on Google Play
            </a>
        </div>
    </div>

    <script>
        // Store URLs
        const appleUrl = "https://apps.apple.com/us/app/sweatpass-earn-screen-time/id6755523483";
        const androidUrl = "https://play.google.com/store/apps/details?id=com.codenexx.sweatpass&hl=en";

        // Detect OS
        const userAgent = navigator.userAgent || navigator.vendor || window.opera;
        let isRedirecting = false;

        if (/android/i.test(userAgent)) {
            window.location.replace(androidUrl);
            isRedirecting = true;
        } else if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
            window.location.replace(appleUrl);
            isRedirecting = true;
        }

        // If no mobile OS matched (e.g., Desktop), or redirection takes time, show the manual buttons
        setTimeout(() => {
            if (!isRedirecting) {
                document.getElementById('status-text').innerText = "Choose your platform below:";
            }
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('fallback-buttons').style.display = 'flex';
        }, isRedirecting ? 2000 : 500); // Show buttons quickly on desktop, slower if trying to redirect on mobile
    </script>
</body>
</html>
